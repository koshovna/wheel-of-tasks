<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Колесо задач</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-gradient-start: #f8f9fc;
            --bg-gradient-end: #eef1f8;
            --text-primary: #2d3748;
            --text-secondary: #4a5568;
            --text-muted: #718096;
            --text-light: #94a3b8;
            --border-color: #e2e8f0;
            --card-bg: #ffffff;
            --card-shadow: rgba(0, 0, 0, 0.08);
            --input-bg: #ffffff;
            --input-border: #e2e8f0;
            --panel-bg: #ffffff;
            --task-bg: #f8fafc;
            --task-hover: #f1f5f9;
            --wheel-empty: #f1f5f9;
            --highlight-bg: linear-gradient(135deg, #eef2ff 0%, #e0e7ff 100%);
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --accent-light: #eef2ff;
            --accent-text: #6366f1;
            --danger: #ef4444;
            --danger-light: #fee2e2;
            --disabled-bg: #cbd5e0;
            --scrollbar-track: #f1f5f9;
            --scrollbar-thumb: #cbd5e0;
        }

        body.dark {
            --bg-gradient-start: #1a1a2e;
            --bg-gradient-end: #16213e;
            --text-primary: #e2e8f0;
            --text-secondary: #cbd5e0;
            --text-muted: #a0aec0;
            --text-light: #718096;
            --border-color: #2d3748;
            --card-bg: #1e293b;
            --card-shadow: rgba(0, 0, 0, 0.3);
            --input-bg: #1e293b;
            --input-border: #2d3748;
            --panel-bg: #1e293b;
            --task-bg: #1a1a2e;
            --task-hover: #2d3748;
            --wheel-empty: #1a1a2e;
            --highlight-bg: linear-gradient(135deg, #312e81 0%, #3730a3 100%);
            --accent: #818cf8;
            --accent-hover: #6366f1;
            --accent-light: #312e81;
            --accent-text: #a5b4fc;
            --danger: #f87171;
            --danger-light: #7f1d1d;
            --disabled-bg: #475569;
            --scrollbar-track: #1a1a2e;
            --scrollbar-thumb: #475569;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(180deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
            transition: background 0.3s, color 0.3s;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 40px;
        }

        .clear-btn {
            margin-left: auto;
            background: transparent;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-family: 'Nunito', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-light);
            cursor: pointer;
            padding: 6px 14px;
            transition: all 0.2s;
        }
        .clear-btn:hover {
            background: var(--danger-light);
            border-color: var(--danger);
            color: var(--danger);
        }

        .theme-toggle {
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            width: 44px;
            height: 44px;
            cursor: pointer;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            box-shadow: 0 2px 8px var(--card-shadow);
        }
        .theme-toggle:hover {
            transform: scale(1.1);
            border-color: var(--accent);
        }

        .header {
            text-align: center;
            margin-bottom: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 480px;
            gap: 60px;
            align-items: start;
        }

        @media (max-width: 1100px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }

        .wheel-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        .wheel-wrapper {
            position: relative;
            width: 620px;
            height: 620px;
        }

        #wheelCanvas {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 12px 48px rgba(0, 0, 0, 0.14));
        }

        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 26px solid transparent;
            border-right: 26px solid transparent;
            border-top: 56px solid #6366f1;
            z-index: 10;
        }

        .pointer::after {
            content: '';
            position: absolute;
            top: -3px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 16px solid transparent;
            border-right: 16px solid transparent;
            border-top: 34px solid #a5b4fc;
        }

        .pointer.winner {
            animation: bounce 0.4s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(8px); }
        }

        .spin-btn {
            padding: 24px 70px;
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: white;
            border: none;
            border-radius: 50px;
            font-family: 'Nunito', sans-serif;
            font-size: 1.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 30px rgba(99, 102, 241, 0.4);
        }

        .spin-btn:hover:not(:disabled) {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(99, 102, 241, 0.5);
        }

        .spin-btn:disabled {
            background: var(--disabled-bg);
            cursor: not-allowed;
            box-shadow: none;
        }

        .time-control {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 14px 24px;
            background: var(--card-bg);
            border-radius: 22px;
            box-shadow: 0 4px 18px var(--card-shadow);
            transition: all 0.3s;
        }

        .time-control label {
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 1rem;
            white-space: nowrap;
        }

        .time-control input[type="range"] {
            width: 180px;
            height: 10px;
            -webkit-appearance: none;
            background: var(--border-color);
            border-radius: 5px;
            outline: none;
        }

        .time-control input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 28px;
            height: 28px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 12px var(--card-shadow);
        }

        .time-value {
            font-weight: 700;
            color: var(--accent);
            min-width: 65px;
            font-size: 1rem;
        }

        .tasks-panel {
            background: var(--panel-bg);
            border-radius: 32px;
            padding: 38px;
            box-shadow: 0 8px 36px var(--card-shadow);
            transition: all 0.3s;
        }

        .panel-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 32px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .panel-header h2 {
            font-size: 1.6rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .task-count {
            background: var(--accent-light);
            color: var(--accent-text);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .add-form {
            display: flex;
            gap: 14px;
            margin-bottom: 24px;
        }

        .add-form input {
            flex: 1;
            padding: 18px 24px;
            border: 2px solid var(--input-border);
            border-radius: 16px;
            font-family: 'Nunito', sans-serif;
            font-size: 1.25rem;
            outline: none;
            transition: border-color 0.2s, background 0.3s;
            background: var(--input-bg);
            color: var(--text-primary);
        }

        .add-form input:focus {
            border-color: var(--accent);
        }

        .add-form input::placeholder {
            color: var(--text-light);
        }

        .add-btn {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .add-btn:hover {
            transform: scale(1.06);
        }

        .tasks-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 500px;
            overflow-y: auto;
        }

        .tasks-list::-webkit-scrollbar {
            width: 10px;
        }

        .tasks-list::-webkit-scrollbar-track {
            background: var(--scrollbar-track);
            border-radius: 5px;
        }

        .tasks-list::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 5px;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 18px 20px;
            background: var(--task-bg);
            border-radius: 18px;
            transition: all 0.2s;
        }

        .task-item:hover {
            background: var(--task-hover);
        }

        .task-item.highlight {
            background: var(--highlight-bg);
            border: 2px solid var(--accent);
        }

        .task-color {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .task-text {
            flex: 1;
            font-size: 1.2rem;
            color: var(--text-secondary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .delete-btn {
            width: 36px;
            height: 36px;
            background: transparent;
            color: var(--scrollbar-thumb);
            border: none;
            border-radius: 12px;
            font-size: 1.6rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
        }

        .task-item:hover .delete-btn {
            opacity: 1;
        }

        .delete-btn:hover {
            background: var(--danger-light);
            color: var(--danger);
        }

        .empty-state {
            text-align: center;
            padding: 60px 24px;
            color: var(--text-light);
            font-size: 1.3rem;
        }

        .min-note {
            text-align: center;
            color: var(--text-light);
            font-size: 1.1rem;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--card-bg);
            padding: 55px 70px;
            border-radius: 32px;
            text-align: center;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.2);
            transform: scale(0.9);
            transition: transform 0.3s, background 0.3s;
        }

        .modal-overlay.active .modal {
            transform: scale(1);
        }

        .modal-icon {
            background: none;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 28px;
            width: 200px;
            height: 200px;
            font-size: 2.6rem;
        }

        .modal h2 {
            font-size: 1.8rem;
            color: var(--text-secondary);
            margin-bottom: 22px;
        }

        .modal .result-task {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 38px;
            line-height: 1.4;
        }

        .modal-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
        }

        .modal-close {
            padding: 18px 40px;
            background: var(--border-color);
            color: var(--text-secondary);
            border: none;
            border-radius: 50px;
            font-family: 'Nunito', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .modal-close:hover {
            background: var(--scrollbar-thumb);
        }

        .modal-delete {
            padding: 18px 40px;
            background: linear-gradient(135deg, var(--danger) 0%, #dc2626 100%);
            color: white;
            border: none;
            border-radius: 50px;
            font-family: 'Nunito', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .modal-delete:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div>
                <h1>Колесо задач</h1>
                <p>Крутите колесо, чтобы выбрать что делать дальше</p>
            </div>
            <button class="theme-toggle" id="themeToggle" title="Переключить тему">🌙</button>
        </header>

        <div class="main-layout">
            <div class="wheel-section">
                <div class="wheel-wrapper">
                    <div class="pointer" id="pointer"></div>
                    <canvas id="wheelCanvas" width="620" height="620"></canvas>
                </div>
                <button class="spin-btn" id="spinBtn">Крутить!</button>
                <div class="time-control">
                    <label>Время:</label>
                    <input type="range" id="timeSlider" min="2" max="10" value="5" step="0.5">
                    <span class="time-value"><span id="timeValue">5</span> сек</span>
                </div>
            </div>

            <div class="tasks-panel">
                <div class="panel-header">
                    <h2>Список задач</h2>
                    <span class="task-count" id="taskCount">0</span>
                    <button class="clear-btn" id="clearBtn">🗑 Очистить</button>
                </div>

                <div class="add-form">
                    <input type="text" id="taskInput" placeholder="Добавить задачу...">
                    <button class="add-btn" id="addBtn">+</button>
                </div>

                <div class="tasks-list" id="tasksList"></div>
                <p class="min-note" id="minNote">Нужно минимум 2 задачи</p>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-icon">
                <img id="modalGif" src="" alt="" width="200" height="200"
                     style="object-fit: cover; border-radius: 16px;">
            </div>
            <h2>Выпала задача:</h2>
            <div class="result-task" id="resultTask"></div>
            <div class="modal-buttons">
                <button class="modal-close" id="modalClose">Делаем</button>
                <button class="modal-delete" id="modalDelete">Удалить задачу</button>
            </div>
        </div>
    </div>

    <script>
        const COLORS = [
            '#f472b6', '#a78bfa', '#818cf8', '#60a5fa', '#34d399',
            '#6ee7b7', '#facc15', '#fb923c', '#f87171', '#e879f9',
            '#38bdf8', '#4ade80', '#c084fc', '#fb7185', '#fcd34d',
            '#22d3ee', '#a855f7', '#f43f5e', '#2dd4bf', '#fbbf24'
        ];

        let tasks = [];
        let isSpinning = false;
        let currentRotation = 0;
        let currentWinnerId = null;

        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');
        const timeSlider = document.getElementById('timeSlider');
        const timeValue = document.getElementById('timeValue');
        const taskInput = document.getElementById('taskInput');
        const addBtn = document.getElementById('addBtn');
        const tasksList = document.getElementById('tasksList');
        const taskCount = document.getElementById('taskCount');
        const minNote = document.getElementById('minNote');
        const modalOverlay = document.getElementById('modalOverlay');
        const resultTask = document.getElementById('resultTask');
        const modalClose = document.getElementById('modalClose');
        const modalDelete = document.getElementById('modalDelete');
        const pointer = document.getElementById('pointer');
        const themeToggle = document.getElementById('themeToggle');

        let centerImage = null;

        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark');
                themeToggle.textContent = '☀️';
            } else {
                document.body.classList.remove('dark');
                themeToggle.textContent = '🌙';
            }
        }

        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            themeToggle.textContent = isDark ? '☀️' : '🌙';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            drawWheel();
        });

        initTheme();

        async function loadCenterImage() {
            try {
                const res = await fetch('/api/center');
                if (res.ok) {
                    const blob = await res.blob();
                    const url = URL.createObjectURL(blob);
                    const img = new Image();
                    img.onload = function() {
                        centerImage = img;
                        drawWheel();
                    };
                    img.src = url;
                }
            } catch (e) {
                console.log('Картинка не найдена');
            }
        }

        async function loadTasks() {
            try {
                const res = await fetch('/api/tasks');
                const json = await res.json();
                if (json.success && Array.isArray(json.data)) {
                    tasks = json.data;
                    updateTasksList();
                    drawWheel();
                }
            } catch (e) {
                console.error('Ошибка загрузки:', e);
            }
        }

        async function addTask(text) {
            try {
                const res = await fetch('/api/tasks/add', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({text})
                });
                const json = await res.json();
                if (json.success) {
                    tasks.push(json.data);
                    updateTasksList();
                    drawWheel();
                }
            } catch (e) {
                console.error('Ошибка добавления:', e);
            }
        }

        async function deleteTask(id) {
            try {
                const res = await fetch('/api/tasks/delete', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({id, force: true})
                });
                const json = await res.json();
                if (json.success) {
                    tasks = tasks.filter(t => t.id !== id);
                    updateTasksList();
                    drawWheel();
                    return true;
                }
                return false;
            } catch (e) {
                console.error('Ошибка удаления:', e);
                return false;
            }
        }

        async function clearAllTasks() {
            if (!confirm('Удалить все задачи?')) return;
            try {
                const res = await fetch('/api/tasks/clear', { method: 'POST' });
                const json = await res.json();
                if (json.success) {
                    tasks = [];
                    updateTasksList();
                    drawWheel();
                }
            } catch (e) {
                console.error('Ошибка очистки:', e);
            }
        }

        document.getElementById('clearBtn').addEventListener('click', clearAllTasks);

        async function spinWheel() {
            if (isSpinning || tasks.length < 2) return;

            isSpinning = true;
            spinBtn.disabled = true;
            pointer.classList.remove('winner');
            currentWinnerId = null;

            try {
                const time = parseFloat(timeSlider.value);
                const res = await fetch(`/api/spin?time=${time}`);
                const json = await res.json();

                if (json.success) {
                    const result = json.data;
                    currentWinnerId = result.winner.id;
                    const winnerText = result.winner.text;
                    const winnerIndex = tasks.findIndex(t => t.id === currentWinnerId);
                    animateSpin(result.targetAngle, result.spinTime * 1000, winnerText, winnerIndex);
                } else {
                    alert(json.error);
                    isSpinning = false;
                    spinBtn.disabled = false;
                }
            } catch (e) {
                console.error('Ошибка вращения:', e);
                isSpinning = false;
                spinBtn.disabled = false;
            }
        }

        function animateSpin(targetAngle, duration, winnerText, winnerIndex) {
            const startTime = performance.now();

            function animate(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);

                const easeOut = 1 - Math.pow(1 - progress, 4);
                currentRotation = targetAngle * easeOut;
                drawWheel();

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    currentRotation = targetAngle;
                    drawWheel();
                    setTimeout(() => {
                        resultTask.textContent = winnerText;
                        document.getElementById('modalGif').src = '/api/random-gif?t=' + Date.now();
                        modalOverlay.classList.add('active');
                        pointer.classList.add('winner');
                        if (winnerIndex >= 0) {
                            highlightTask(winnerIndex);
                        }
                    }, 200);

                    isSpinning = false;
                    spinBtn.disabled = false;
                }
            }

            requestAnimationFrame(animate);
        }

        function drawWheel() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = Math.min(centerX, centerY) - 15;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (tasks.length === 0) {
                const style = getComputedStyle(document.body);
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                ctx.fillStyle = style.getPropertyValue('--wheel-empty').trim();
                ctx.fill();
                ctx.strokeStyle = style.getPropertyValue('--border-color').trim();
                ctx.lineWidth = 4;
                ctx.stroke();

                ctx.fillStyle = style.getPropertyValue('--text-light').trim();
                ctx.font = '600 24px Nunito';
                ctx.textAlign = 'center';
                ctx.fillText('Добавьте задачи', centerX, centerY + 8);
                return;
            }

            const segmentAngle = (Math.PI * 2) / tasks.length;
            const textRadius = radius * 0.72;

            tasks.forEach((task, i) => {
                const startAngle = currentRotation + i * segmentAngle;
                const endAngle = startAngle + segmentAngle;
                const color = task.color || COLORS[i % COLORS.length];

                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.closePath();
                ctx.fillStyle = color;
                ctx.fill();

                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(
                    centerX + radius * Math.cos(startAngle),
                    centerY + radius * Math.sin(startAngle)
                );
                ctx.strokeStyle = 'rgba(255,255,255,0.4)';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(startAngle + segmentAngle / 2);
                ctx.textAlign = 'right';
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 18px Nunito';

                const maxWidth = textRadius * 0.75;
                let text = task.text;

                while (ctx.measureText(text).width > maxWidth && text.length > 6) {
                    text = text.slice(0, -1);
                }
                if (text !== task.text) text += '…';

                ctx.fillText(text, textRadius, 8);
                ctx.restore();
            });

            ctx.beginPath();
            ctx.arc(centerX, centerY, radius + 2, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.lineWidth = 6;
            ctx.stroke();

            // Центр
            const centerRadius = 62;

            if (centerImage) {
                ctx.save();
                ctx.beginPath();
                ctx.arc(centerX, centerY, centerRadius, 0, Math.PI * 2);
                ctx.clip();
                const size = centerRadius * 2;
                ctx.drawImage(centerImage, centerX - centerRadius, centerY - centerRadius, size, size);
                ctx.restore();

                ctx.beginPath();
                ctx.arc(centerX, centerY, centerRadius, 0, Math.PI * 2);
                ctx.strokeStyle = '#e2e8f0';
                ctx.lineWidth = 4;
                ctx.stroke();
            } else {
                ctx.beginPath();
                ctx.arc(centerX, centerY, centerRadius, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.fill();
                ctx.strokeStyle = '#e2e8f0';
                ctx.lineWidth = 4;
                ctx.stroke();

                ctx.fillStyle = '#6366f1';
                ctx.font = '700 34px Nunito';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('🎯', centerX, centerY);
            }
        }

        function updateTasksList() {
            tasksList.innerHTML = '';
            taskCount.textContent = tasks.length;

            if (tasks.length === 0) {
                tasksList.innerHTML = '<div class="empty-state"><p>Список задач пуст.<br>Добавьте что-нибудь!</p></div>';
            } else {
                tasks.forEach((task, i) => {
                    const item = document.createElement('div');
                    item.className = 'task-item';
                    item.innerHTML = `
                        <span class="task-color" style="background: ${task.color || COLORS[i % COLORS.length]}"></span>
                        <span class="task-text">${task.text}</span>
                        <button class="delete-btn" data-id="${task.id}">×</button>
                    `;
                    tasksList.appendChild(item);
                });
            }

            minNote.style.display = tasks.length >= 2 ? 'none' : 'block';
            spinBtn.disabled = tasks.length < 2;
        }

        function highlightTask(index) {
            document.querySelectorAll('.task-item').forEach((el, i) => {
                el.classList.toggle('highlight', i === index);
            });
        }

        function closeModal() {
            modalOverlay.classList.remove('active');
            currentWinnerId = null;
        }

        async function deleteWinner() {
            if (currentWinnerId) {
                await deleteTask(currentWinnerId);
                currentWinnerId = null;
                closeModal();
            }
        }

        spinBtn.addEventListener('click', spinWheel);

        timeSlider.addEventListener('input', () => {
            timeValue.textContent = timeSlider.value;
        });

        addBtn.addEventListener('click', () => {
            const text = taskInput.value.trim();
            if (text) {
                addTask(text);
                taskInput.value = '';
            }
        });

        taskInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const text = taskInput.value.trim();
                if (text) {
                    addTask(text);
                    taskInput.value = '';
                }
            }
        });

        tasksList.addEventListener('click', (e) => {
            if (e.target.classList.contains('delete-btn')) {
                deleteTask(e.target.dataset.id);
            }
        });

        modalClose.addEventListener('click', closeModal);
        modalDelete.addEventListener('click', deleteWinner);

        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) closeModal();
        });

        loadCenterImage();
        loadTasks();
    </script>
</body>
</html>
